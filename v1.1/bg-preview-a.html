<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>背景A: 波打つブロブ</title>
<style>
* { margin: 0; padding: 0; }
body { background: #050508; overflow: hidden; height: 100vh; }
.label {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  font-family: sans-serif; font-size: 14px; color: rgba(255,255,255,0.5);
  z-index: 100; text-align: center; letter-spacing: 1px;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: blobMove var(--dur) ease-in-out infinite alternate;
}
@keyframes blobMove {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(var(--mx), var(--my)) scale(1.15); }
  66% { transform: translate(calc(var(--mx) * -0.5), calc(var(--my) * 0.7)) scale(0.9); }
  100% { transform: translate(var(--mx2), var(--my2)) scale(1.05); }
}
/* Glass sample */
.glass-sample {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 400px; padding: 24px 28px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  box-shadow: inset 0 0 20px rgba(255,255,255,0.12), 0 8px 32px rgba(0,0,0,0.3);
  color: #fff; font-family: sans-serif; font-size: 14px; line-height: 1.8;
  z-index: 50;
}
</style>
</head>
<body>
<div class="label">A: 波打つブロブ（Lava Lamp風）</div>

<div class="blob" style="width:400px;height:400px;background:rgba(241,56,132,0.15);top:10%;left:15%;--dur:12s;--mx:80px;--my:60px;--mx2:-40px;--my2:80px;"></div>
<div class="blob" style="width:350px;height:350px;background:rgba(247,81,59,0.12);top:5%;right:20%;--dur:14s;--mx:-60px;--my:70px;--mx2:50px;--my2:-30px;"></div>
<div class="blob" style="width:450px;height:450px;background:rgba(52,224,255,0.12);bottom:10%;right:15%;--dur:16s;--mx:-70px;--my:-50px;--mx2:60px;--my2:40px;"></div>
<div class="blob" style="width:380px;height:380px;background:rgba(149,62,195,0.12);bottom:15%;left:10%;--dur:13s;--mx:50px;--my:-60px;--mx2:-70px;--my2:-20px;"></div>
<div class="blob" style="width:300px;height:300px;background:rgba(15,75,171,0.10);top:40%;left:40%;--dur:15s;--mx:-30px;--my:40px;--mx2:40px;--my2:-50px;"></div>

<div class="glass-sample">
  おかえり、佐藤さん。<br>前回はネットワーク基礎まで進みましたね。
</div>
</body>
</html>
