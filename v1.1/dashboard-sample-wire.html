<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード構成案 — ワイヤーフレーム版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Noto Sans JP', 'Lato', sans-serif; background: #050508; color: #fff; }

.bg-volcano { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-volcano img { position: absolute; top: 0; right: -10%; height: 100%; width: auto; object-fit: cover; opacity: 0.4; }
.bg-volcano::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, rgba(5,5,8,0.9) 35%, rgba(5,5,8,0.5) 60%, rgba(5,5,8,0.3) 100%); }

/* Header */
.header { position: fixed; top: 16px; left: 16px; right: 16px; height: 52px; z-index: 50; display: flex; align-items: center; padding: 0 18px; gap: 10px; background: rgba(0,0,0,0.01); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border-radius: 20px; box-shadow: inset 1px 1px 20px rgba(255,255,255,0.2); }
.header img { height: 22px; }
.header .ht { font-family: 'Lato', sans-serif; font-size: 12px; color: rgba(255,255,255,0.35); }
.header .hr { margin-left: auto; }
.hb { padding: 8px 18px; background: linear-gradient(135deg, #0f4bab, #34e0ff); border: none; border-radius: 12px; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }

/* Layout */
.layout {
  position: fixed;
  top: 84px; bottom: 16px; left: 16px; right: 16px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 12px;
  z-index: 10;
}

/* ===== LEFT SIDEBAR ===== */
.sidebar {
  background: rgba(0,0,0,0.1);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: inset 0px 0px 30px rgba(255,255,255,0.3), inset -1px -2px 2px rgba(255,255,255,0.1), inset 1px 1px 2px rgba(255,255,255,0.3);
  padding: 20px 16px;
  display: flex; flex-direction: column; align-items: center;
  overflow-y: auto;
}
.sb-name { font-family: 'Lato', sans-serif; font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.sb-meta { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 12px; }
.sb-level { padding: 5px 16px; border-radius: 100px; background: linear-gradient(135deg, rgba(52,224,255,0.15), rgba(15,75,171,0.15)); border: 1px solid rgba(52,224,255,0.3); color: #34e0ff; font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 900; margin-bottom: 16px; }

.sb-section-label { font-family: 'Lato', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-bottom: 6px; width: 100%; text-align: left; margin-top: 12px; }

.sb-badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-bottom: 4px; }
.sb-badge { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; font-family: 'Lato', sans-serif; transition: all 0.2s; }
.sb-badge.earned { color: #fff; box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), inset 0 -1px 1px rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.3); }
.sb-badge.earned:hover { transform: scale(1.1); }
.sb-badge.locked { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.05); }

/* Calendar */
.sb-cal { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px; margin-top: 4px; }
.sb-cal-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.sb-cal-month { font-family: 'Lato', sans-serif; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); }
.sb-cal-streak { font-family: 'Lato', sans-serif; font-size: 10px; font-weight: 700; color: #f7513b; }
.sb-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.sb-cal-h { font-size: 6px; color: rgba(255,255,255,0.2); text-align: center; padding: 1px 0; font-family: 'Lato', sans-serif; font-weight: 700; }
.sb-cal-d { aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 6px; font-family: 'Lato', sans-serif; font-weight: 700; color: rgba(255,255,255,0.08); }
.sb-cal-d.l1 { background: rgba(149,62,195,0.15); color: rgba(255,255,255,0.2); }
.sb-cal-d.l2 { background: rgba(149,62,195,0.3); color: rgba(255,255,255,0.35); }
.sb-cal-d.l3 { background: rgba(15,75,171,0.4); color: rgba(255,255,255,0.5); }
.sb-cal-d.l4 { background: linear-gradient(135deg, #953ec3, #0f4bab); color: #fff; }
.sb-cal-d.today { box-shadow: 0 0 0 1.5px rgba(255,255,255,0.4); }

/* Utility buttons */
.sb-utils { display: flex; gap: 6px; margin-top: auto; padding-top: 12px; }
.sb-util { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; color: rgba(255,255,255,0.3); transition: all 0.2s; position: relative; }
.sb-util:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
.sb-util .nb { position: absolute; top: -3px; right: -3px; width: 12px; height: 12px; background: #f7513b; border-radius: 50%; font-size: 7px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Lato', sans-serif; }

/* ===== RIGHT MAIN ===== */
.main-area {
  display: flex; flex-direction: column; gap: 12px;
}

/* Top: KANAME speech bubble + action */
.speech-area {
  background: rgba(0,0,0,0.1);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: inset 0px 0px 30px rgba(255,255,255,0.3), inset -1px -2px 2px rgba(255,255,255,0.1), inset 1px 1px 2px rgba(255,255,255,0.3);
  padding: 20px;
  display: flex; align-items: flex-start; gap: 16px;
}
.speech-orb { width: 56px; height: 56px; border-radius: 50%; position: relative; flex-shrink: 0; }
.speech-orb .og { position: absolute; inset: -10px; border-radius: 50%; background: conic-gradient(from 0deg,#f13884,#f7513b,#f8ee1a,#7cbf00,#34e0ff,#0f4bab,#953ec3,#f13884); filter: blur(14px); opacity: 0.4; animation: spin 10s linear infinite; }
.speech-orb .ob { position: absolute; inset: 3px; border-radius: 50%; background: conic-gradient(from 200deg,#f13884,#f7513b,#f8ee1a,#7cbf00,#34e0ff,#0f4bab,#953ec3,#f13884); filter: blur(7px) saturate(1.3); animation: spin 7s linear infinite reverse; }
.speech-orb .of { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 26px; height: 13px; background: rgba(8,8,35,0.75); border-radius: 100px; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 7px; }
.speech-orb .oe { width: 3px; height: 7px; background: #fff; border-radius: 2px; box-shadow: 0 0 5px rgba(255,255,255,0.8); }
@keyframes spin { to { transform: rotate(360deg); } }

.speech-content { flex: 1; }
.speech-bubble {
  background: rgba(255,255,255,0.05);
  border-radius: 4px 16px 16px 16px;
  padding: 14px 18px;
  font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.85);
  margin-bottom: 12px;
  position: relative;
}
.speech-bubble strong { color: #fff; }
.speech-bubble .hl { color: #34e0ff; font-weight: 700; }
.speech-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px;
  background: linear-gradient(135deg, #f7513b, #f13884);
  color: #fff; border: none; border-radius: 14px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s;
}
.speech-cta:hover { opacity: 0.9; }

/* Mid: Chat input */
.chat-bar {
  background: rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 12px 16px;
  display: flex; gap: 8px; align-items: center;
}
.chat-bar input {
  flex: 1; padding: 10px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 100px;
  color: #fff; font-size: 13px; outline: none; font-family: inherit;
}
.chat-bar input::placeholder { color: rgba(255,255,255,0.2); }
.chat-bar button {
  padding: 10px 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  color: rgba(255,255,255,0.3);
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all 0.2s;
}
.chat-bar button.active { background: linear-gradient(135deg, #953ec3, #0f4bab); border-color: transparent; color: #fff; }

/* Bottom: Progress cards */
.progress-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.prog-card {
  background: rgba(0,0,0,0.1);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 16px;
  box-shadow: inset 0px 0px 30px rgba(255,255,255,0.3), inset -1px -2px 2px rgba(255,255,255,0.1), inset 1px 1px 2px rgba(255,255,255,0.3);
  padding: 20px;
}
.prog-label { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
.prog-value { font-family: 'Lato', sans-serif; font-size: 36px; font-weight: 900; margin-bottom: 8px; }
.prog-value .unit { font-size: 16px; color: rgba(255,255,255,0.5); }
.prog-track { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; max-width: 180px; }
.prog-fill { height: 100%; border-radius: 4px; }
.prog-fill.rainbow { background: linear-gradient(to right, #f7513b, #f8ee1a, #7cbf00, #34e0ff, #0f4bab, #953ec3, #f13884); }
.prog-fill.blue { background: linear-gradient(to right, #0f4bab, #34e0ff); }

@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 12px; }
  .progress-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="bg-volcano"><img src="volcano-bg.png" alt=""></div>

<header class="header">
  <img src="logo.png" alt="CyTech">
  <span class="ht">ダッシュボード</span>
  <div class="hr"><button class="hb">学習に戻る →</button></div>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="sb-name">佐藤 健太</div>
    <div class="sb-meta">情シス志望 / 97日目</div>
    <div class="sb-level">B1 Rookie</div>

    <div class="sb-section-label">バッジ</div>
    <div class="sb-badges">
      <div class="sb-badge earned" style="background:#f7513b;">IT</div>
      <div class="sb-badge earned" style="background:#f13884;">HW</div>
      <div class="sb-badge earned" style="background:#953ec3;">OS</div>
      <div class="sb-badge locked">NW</div>
      <div class="sb-badge locked">SC</div>
      <div class="sb-badge locked">DB</div>
      <div class="sb-badge locked">EX</div>
      <div class="sb-badge locked">SP</div>
    </div>

    <div class="sb-section-label">学習カレンダー</div>
    <div class="sb-cal">
      <div class="sb-cal-top"><span class="sb-cal-month">4月 2026</span><span class="sb-cal-streak">🔥5日</span></div>
      <div class="sb-cal-grid">
        <div class="sb-cal-h">M</div><div class="sb-cal-h">T</div><div class="sb-cal-h">W</div><div class="sb-cal-h">T</div><div class="sb-cal-h">F</div><div class="sb-cal-h">S</div><div class="sb-cal-h">S</div>
        <div class="sb-cal-d"></div><div class="sb-cal-d l2">1</div><div class="sb-cal-d l3">2</div><div class="sb-cal-d">3</div><div class="sb-cal-d l1">4</div><div class="sb-cal-d">5</div><div class="sb-cal-d">6</div>
        <div class="sb-cal-d l4">7</div><div class="sb-cal-d l3">8</div><div class="sb-cal-d l2">9</div><div class="sb-cal-d l4">10</div><div class="sb-cal-d l1">11</div><div class="sb-cal-d">12</div><div class="sb-cal-d l1">13</div>
        <div class="sb-cal-d l3">14</div><div class="sb-cal-d l4">15</div><div class="sb-cal-d l2">16</div><div class="sb-cal-d l3">17</div><div class="sb-cal-d l4">18</div><div class="sb-cal-d l1">19</div><div class="sb-cal-d">20</div>
        <div class="sb-cal-d l4">21</div><div class="sb-cal-d l4">22</div><div class="sb-cal-d l4">23</div><div class="sb-cal-d l4 today">24</div><div class="sb-cal-d">25</div><div class="sb-cal-d">26</div><div class="sb-cal-d">27</div>
      </div>
    </div>

    <div class="sb-utils">
      <div class="sb-util" title="企業・選考">📋</div>
      <div class="sb-util" title="ポートフォリオ">📊</div>
      <div class="sb-util" title="設定">⚙</div>
      <div class="sb-util" title="お知らせ">🔔<span class="nb">2</span></div>
    </div>
  </div>

  <!-- RIGHT MAIN -->
  <div class="main-area">

    <!-- KANAME speech + action -->
    <div class="speech-area">
      <div class="speech-orb">
        <div class="og"></div><div class="ob"></div>
        <div class="of"><div class="oe"></div><div class="oe"></div></div>
      </div>
      <div class="speech-content">
        <div class="speech-bubble">
          おかえりなさい、<strong>佐藤さん</strong>。<br>
          <strong>Unit 5 — ネットワーク基礎</strong>の続きですね。前回のSTEP 3、営業の組織図の話の続きから始めましょう。<span class="hl">あと38時間</span>で面接開放です。
        </div>
        <button class="speech-cta">再開する →</button>
      </div>
    </div>

    <!-- Chat input -->
    <div class="chat-bar">
      <input type="text" id="ci" placeholder="KANAMEに質問する..." oninput="document.getElementById('cs').classList.toggle('active',this.value.trim().length>0)">
      <button id="cs">送信</button>
    </div>

    <!-- Progress cards -->
    <div class="progress-row">
      <div class="prog-card">
        <div class="prog-label">カリキュラム進捗</div>
        <div class="prog-value">52<span class="unit">%</span></div>
        <div class="prog-track"><div class="prog-fill rainbow" style="width:52%;"></div></div>
      </div>
      <div class="prog-card">
        <div class="prog-label">面接開放まで</div>
        <div class="prog-value">38<span class="unit">h</span></div>
        <div class="prog-track"><div class="prog-fill blue" style="width:52%;"></div></div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
