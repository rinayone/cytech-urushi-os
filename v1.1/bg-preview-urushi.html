<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>背景: CyTech Volcano × 漆</title>
<style>
* { margin: 0; padding: 0; }
body { background: #020206; overflow: hidden; height: 100vh; }

/* ===== VOLCANO FLOW ===== */
/* Layer 1 (deepest): dark base colors seeping through */
.volcano-layer-1 {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 40% 80% at 55% 50%, rgba(15,75,171,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 35% 70% at 50% 40%, rgba(149,62,195,0.12) 0%, transparent 55%);
  animation: layer1 28s ease-in-out infinite alternate;
}
@keyframes layer1 {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-12px) scale(1.03); }
}

/* Layer 2: mid-depth warm colors */
.volcano-layer-2 {
  position: fixed;
  inset: 0;
  animation: layer2 22s ease-in-out infinite alternate;
}
.volcano-layer-2 .flow {
  position: absolute;
  filter: blur(50px);
  border-radius: 50% 40% 55% 45% / 45% 55% 40% 50%;
  animation: flowMorph 15s ease-in-out infinite alternate;
}
@keyframes layer2 {
  0% { transform: translateY(0); }
  100% { transform: translateY(-8px); }
}
@keyframes flowMorph {
  0%   { border-radius: 50% 40% 55% 45% / 45% 55% 40% 50%; }
  50%  { border-radius: 40% 55% 45% 50% / 50% 40% 55% 45%; }
  100% { border-radius: 55% 45% 50% 40% / 40% 50% 45% 55%; }
}

/* Pink-red stream */
.flow-pink {
  width: 350px; height: 500px;
  background: linear-gradient(170deg, #f13884 0%, rgba(247,81,59,0.6) 50%, transparent 100%);
  top: -5%; left: 40%;
  opacity: 0.35;
  animation-duration: 14s;
}

/* Orange-yellow stream */
.flow-orange {
  width: 280px; height: 450px;
  background: linear-gradient(175deg, #f7513b 0%, rgba(248,238,26,0.5) 50%, transparent 100%);
  top: 5%; left: 48%;
  opacity: 0.28;
  animation-duration: 16s;
  animation-direction: alternate-reverse;
}

/* Cyan-blue stream */
.flow-cyan {
  width: 320px; height: 520px;
  background: linear-gradient(185deg, #34e0ff 0%, rgba(15,75,171,0.6) 50%, transparent 100%);
  top: 15%; left: 52%;
  opacity: 0.3;
  animation-duration: 13s;
}

/* Purple undertow */
.flow-purple {
  width: 300px; height: 480px;
  background: linear-gradient(190deg, #953ec3 0%, rgba(241,56,132,0.4) 50%, transparent 100%);
  bottom: -5%; left: 44%;
  opacity: 0.25;
  animation-duration: 17s;
  animation-direction: alternate-reverse;
}

/* Layer 3: surface — brighter, more defined streams */
.volcano-layer-3 {
  position: fixed;
  inset: 0;
  animation: layer3 18s ease-in-out infinite alternate;
}
.volcano-layer-3 .stream {
  position: absolute;
  filter: blur(35px);
  border-radius: 45% 55% 50% 50% / 50% 45% 55% 50%;
  animation: streamFlow 12s ease-in-out infinite alternate;
}
@keyframes layer3 {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-5px) scale(1.02); }
}
@keyframes streamFlow {
  0%   { border-radius: 45% 55% 50% 50% / 50% 45% 55% 50%; transform: translateY(0) rotate(0deg); }
  50%  { border-radius: 55% 45% 45% 55% / 45% 55% 50% 50%; transform: translateY(-10px) rotate(1deg); }
  100% { border-radius: 50% 50% 55% 45% / 55% 50% 45% 50%; transform: translateY(5px) rotate(-1deg); }
}

.stream-hot {
  width: 180px; height: 400px;
  background: linear-gradient(175deg, rgba(241,56,132,0.6), rgba(247,81,59,0.5) 40%, rgba(248,238,26,0.3) 70%, transparent);
  top: 0%; left: 46%;
  opacity: 0.4;
  animation-duration: 11s;
}

.stream-cool {
  width: 160px; height: 380px;
  background: linear-gradient(185deg, rgba(52,224,255,0.5), rgba(15,75,171,0.5) 40%, rgba(149,62,195,0.3) 70%, transparent);
  top: 20%; left: 50%;
  opacity: 0.35;
  animation-duration: 13s;
  animation-direction: alternate-reverse;
}

/* Urushi lacquer sheen — wet surface reflection */
.urushi-sheen {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 25% at 50% 15%, rgba(255,255,255,0.025) 0%, transparent 50%),
    radial-gradient(ellipse 40% 20% at 48% 85%, rgba(255,255,255,0.015) 0%, transparent 40%);
  z-index: 2;
  animation: sheen 20s ease-in-out infinite alternate;
}
@keyframes sheen {
  0% { opacity: 1; }
  100% { opacity: 0.6; transform: translateY(-8px); }
}

/* Darken edges — keep center readable */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 65% at 50% 50%, transparent 30%, rgba(2,2,6,0.7) 100%);
  z-index: 3;
}

/* ===== GLASS SAMPLE ===== */
.glass-sample {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 420px; padding: 24px 28px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 0 24px rgba(255,255,255,0.05),
    0 8px 40px rgba(0,0,0,0.4);
  color: rgba(255,255,255,0.9);
  font-family: sans-serif;
  font-size: 14px;
  line-height: 1.9;
  z-index: 50;
}
.glass-sample strong { color: #fff; }
.glass-sample .hl { color: #34e0ff; font-weight: 700; }
</style>
</head>
<body>

<!-- Volcano layers (deep → surface, like urushi coats) -->
<div class="volcano-layer-1"></div>

<div class="volcano-layer-2">
  <div class="flow flow-pink"></div>
  <div class="flow flow-orange"></div>
  <div class="flow flow-cyan"></div>
  <div class="flow flow-purple"></div>
</div>

<div class="volcano-layer-3">
  <div class="stream stream-hot"></div>
  <div class="stream stream-cool"></div>
</div>

<div class="urushi-sheen"></div>
<div class="vignette"></div>

<div class="glass-sample">
  おかえり、<strong>佐藤さん</strong>。<br>
  前回は<span class="hl">ネットワーク基礎</span>まで進みましたね。
</div>

</body>
</html>
