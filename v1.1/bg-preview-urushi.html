<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>背景: CyTech Volcano × 漆</title>
<style>
* { margin: 0; padding: 0; }
body { background: #020206; overflow: hidden; height: 100vh; }

/* ===== VOLCANO FLOW ===== */

/* Layer 1 (deepest): dark base */
.volcano-layer-1 {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 40% 80% at 55% 50%, rgba(15,75,171,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 35% 70% at 50% 40%, rgba(149,62,195,0.12) 0%, transparent 55%);
  animation: layer1 28s ease-in-out infinite alternate;
}
@keyframes layer1 {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-12px) scale(1.03); }
}

/* Layer 2: mid-depth flowing ribbons */
.volcano-layer-2 {
  position: fixed;
  inset: 0;
  animation: layer2 22s ease-in-out infinite alternate;
}
.volcano-layer-2 .flow {
  position: absolute;
  filter: blur(50px);
  animation: flowMorph var(--morph) ease-in-out infinite alternate;
}
@keyframes layer2 {
  0% { transform: translateY(0); }
  100% { transform: translateY(-8px); }
}
@keyframes flowMorph {
  0%   { border-radius: 30% 70% 60% 40% / 60% 30% 70% 40%; }
  33%  { border-radius: 60% 40% 35% 65% / 40% 65% 30% 70%; }
  66%  { border-radius: 40% 60% 70% 30% / 70% 40% 60% 30%; }
  100% { border-radius: 65% 35% 40% 60% / 35% 70% 40% 60%; }
}

/* Pink-red ribbon — tall flowing S */
.flow-pink {
  width: 220px; height: 600px;
  background: linear-gradient(170deg, #f13884 0%, rgba(247,81,59,0.6) 50%, transparent 100%);
  top: -8%; left: 38%;
  opacity: 0.6;
  --morph: 14s;
  border-radius: 30% 70% 60% 40% / 60% 30% 70% 40%;
}

/* Orange-yellow ribbon — elongated diagonal */
.flow-orange {
  width: 180px; height: 520px;
  background: linear-gradient(175deg, #f7513b 0%, rgba(248,238,26,0.5) 50%, transparent 100%);
  top: 2%; left: 46%;
  opacity: 0.55;
  --morph: 16s;
  border-radius: 60% 40% 35% 65% / 40% 65% 30% 70%;
  animation-direction: alternate-reverse;
}

/* Cyan-blue ribbon — tall curve */
.flow-cyan {
  width: 200px; height: 580px;
  background: linear-gradient(185deg, #34e0ff 0%, rgba(15,75,171,0.6) 50%, transparent 100%);
  top: 10%; left: 54%;
  opacity: 0.58;
  --morph: 13s;
  border-radius: 40% 60% 70% 30% / 70% 40% 60% 30%;
}

/* Purple ribbon — sweeping undertow */
.flow-purple {
  width: 240px; height: 550px;
  background: linear-gradient(190deg, #953ec3 0%, rgba(241,56,132,0.4) 50%, transparent 100%);
  bottom: -8%; left: 42%;
  opacity: 0.55;
  --morph: 17s;
  border-radius: 65% 35% 40% 60% / 35% 70% 40% 60%;
  animation-direction: alternate-reverse;
}

/* Layer 3: surface — sharper, thinner streams */
.volcano-layer-3 {
  position: fixed;
  inset: 0;
  animation: layer3 18s ease-in-out infinite alternate;
}
.volcano-layer-3 .stream {
  position: absolute;
  filter: blur(35px);
  animation: streamFlow 12s ease-in-out infinite alternate;
}
@keyframes layer3 {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-5px) scale(1.02); }
}
@keyframes streamFlow {
  0%   { border-radius: 25% 75% 65% 35% / 70% 30% 65% 35%; transform: translateY(0) rotate(0deg); }
  50%  { border-radius: 70% 30% 35% 65% / 35% 65% 30% 70%; transform: translateY(-12px) rotate(2deg); }
  100% { border-radius: 35% 65% 70% 30% / 65% 35% 70% 30%; transform: translateY(5px) rotate(-1deg); }
}

/* Hot stream — thin vertical ribbon */
.stream-hot {
  width: 120px; height: 450px;
  background: linear-gradient(175deg, rgba(241,56,132,0.7), rgba(247,81,59,0.5) 40%, rgba(248,238,26,0.3) 75%, transparent);
  top: -2%; left: 44%;
  opacity: 0.65;
  border-radius: 25% 75% 65% 35% / 70% 30% 65% 35%;
  animation-duration: 11s;
}

/* Cool stream — thin flowing curve */
.stream-cool {
  width: 110px; height: 430px;
  background: linear-gradient(185deg, rgba(52,224,255,0.6), rgba(15,75,171,0.5) 40%, rgba(149,62,195,0.3) 75%, transparent);
  top: 18%; left: 52%;
  opacity: 0.6;
  border-radius: 70% 30% 35% 65% / 35% 65% 30% 70%;
  animation-duration: 13s;
  animation-direction: alternate-reverse;
}

/* Darken edges */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 65% at 50% 50%, transparent 30%, rgba(2,2,6,0.7) 100%);
  z-index: 3;
}

/* ===== GLASS SAMPLE ===== */
.glass-sample {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 420px; padding: 24px 28px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 0 24px rgba(255,255,255,0.05),
    0 8px 40px rgba(0,0,0,0.4);
  color: rgba(255,255,255,0.9);
  font-family: sans-serif;
  font-size: 14px;
  line-height: 1.9;
  z-index: 50;
}
.glass-sample strong { color: #fff; }
.glass-sample .hl { color: #34e0ff; font-weight: 700; }
</style>
</head>
<body>

<div class="volcano-layer-1"></div>

<div class="volcano-layer-2">
  <div class="flow flow-pink"></div>
  <div class="flow flow-orange"></div>
  <div class="flow flow-cyan"></div>
  <div class="flow flow-purple"></div>
</div>

<div class="volcano-layer-3">
  <div class="stream stream-hot"></div>
  <div class="stream stream-cool"></div>
</div>

<div class="vignette"></div>

<div class="glass-sample">
  おかえり、<strong>佐藤さん</strong>。<br>
  前回は<span class="hl">ネットワーク基礎</span>まで進みましたね。
</div>

</body>
</html>
