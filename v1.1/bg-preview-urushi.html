<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>背景: CyTech Volcano × 漆</title>
<style>
* { margin: 0; padding: 0; }
body { background: #020206; overflow: hidden; height: 100vh; }

.ribbon-canvas {
  position: fixed;
  inset: 0;
}

.ribbon {
  position: absolute;
  filter: blur(var(--bl));
  animation: ribbonFlow var(--dur) ease-in-out infinite alternate;
  transform: rotate(var(--rot)) skewX(var(--skew));
}

@keyframes ribbonFlow {
  0%   {
    border-radius: 20% 80% 70% 30% / 80% 20% 75% 25%;
    transform: rotate(var(--rot)) skewX(var(--skew)) translate(0, 0);
  }
  50%  {
    border-radius: 75% 25% 30% 70% / 25% 80% 20% 75%;
    transform: rotate(calc(var(--rot) + var(--rot2))) skewX(calc(var(--skew) * -0.7)) translate(var(--tx), var(--ty));
  }
  100% {
    border-radius: 30% 70% 80% 20% / 70% 30% 80% 25%;
    transform: rotate(calc(var(--rot) - 3deg)) skewX(var(--skew)) translate(calc(var(--tx) * -0.5), calc(var(--ty) * 0.5));
  }
}

/* ===== TOP-LEFT: Pink → Red ===== */
.r-pink-1 {
  width: 100px; height: 600px;
  background: linear-gradient(180deg, #f13884 0%, rgba(247,81,59,0.6) 60%, transparent);
  top: -10%; left: 5%;
  opacity: 0.6;
  --bl: 22px; --dur: 16s; --rot: -15deg; --rot2: 8deg; --skew: 12deg; --tx: 30px; --ty: 20px;
}
.r-pink-2 {
  width: 70px; height: 500px;
  background: linear-gradient(175deg, rgba(241,56,132,0.8) 0%, rgba(247,81,59,0.3) 70%, transparent);
  top: -5%; left: 10%;
  opacity: 0.5;
  --bl: 18px; --dur: 14s; --rot: -20deg; --rot2: 6deg; --skew: -8deg; --tx: -20px; --ty: 25px;
}
.r-pink-3 {
  width: 50px; height: 450px;
  background: linear-gradient(170deg, #f7513b 0%, rgba(241,56,132,0.5) 50%, transparent);
  top: 0%; left: 15%;
  opacity: 0.55;
  --bl: 15px; --dur: 18s; --rot: -10deg; --rot2: 5deg; --skew: 15deg; --tx: 15px; --ty: -15px;
}

/* ===== TOP-RIGHT: Cyan → Blue ===== */
.r-cyan-1 {
  width: 90px; height: 580px;
  background: linear-gradient(185deg, #34e0ff 0%, rgba(15,75,171,0.6) 60%, transparent);
  top: -8%; right: 8%;
  opacity: 0.58;
  --bl: 22px; --dur: 17s; --rot: 18deg; --rot2: -7deg; --skew: -10deg; --tx: -25px; --ty: 20px;
}
.r-cyan-2 {
  width: 60px; height: 480px;
  background: linear-gradient(190deg, rgba(52,224,255,0.8) 0%, rgba(15,75,171,0.4) 65%, transparent);
  top: -3%; right: 14%;
  opacity: 0.5;
  --bl: 16px; --dur: 15s; --rot: 22deg; --rot2: -5deg; --skew: 8deg; --tx: 18px; --ty: 22px;
}
.r-cyan-3 {
  width: 45px; height: 420px;
  background: linear-gradient(180deg, rgba(15,75,171,0.7) 0%, rgba(52,224,255,0.3) 50%, transparent);
  top: 2%; right: 5%;
  opacity: 0.5;
  --bl: 14px; --dur: 19s; --rot: 12deg; --rot2: -8deg; --skew: -14deg; --tx: -15px; --ty: -18px;
}

/* ===== BOTTOM-LEFT: Purple ===== */
.r-purple-1 {
  width: 100px; height: 550px;
  background: linear-gradient(5deg, #953ec3 0%, rgba(241,56,132,0.4) 60%, transparent);
  bottom: -12%; left: 8%;
  opacity: 0.55;
  --bl: 22px; --dur: 18s; --rot: 10deg; --rot2: -6deg; --skew: -12deg; --tx: 25px; --ty: -20px;
}
.r-purple-2 {
  width: 65px; height: 480px;
  background: linear-gradient(355deg, rgba(149,62,195,0.8) 0%, rgba(15,75,171,0.3) 65%, transparent);
  bottom: -6%; left: 2%;
  opacity: 0.5;
  --bl: 17px; --dur: 15s; --rot: 15deg; --rot2: -4deg; --skew: 10deg; --tx: -18px; --ty: -25px;
}

/* ===== BOTTOM-RIGHT: Orange → Yellow ===== */
.r-orange-1 {
  width: 85px; height: 530px;
  background: linear-gradient(350deg, #f7513b 0%, rgba(248,238,26,0.5) 55%, transparent);
  bottom: -10%; right: 10%;
  opacity: 0.58;
  --bl: 20px; --dur: 16s; --rot: -12deg; --rot2: 7deg; --skew: 10deg; --tx: -22px; --ty: -18px;
}
.r-orange-2 {
  width: 55px; height: 440px;
  background: linear-gradient(345deg, rgba(248,238,26,0.7) 0%, rgba(247,81,59,0.4) 60%, transparent);
  bottom: -5%; right: 16%;
  opacity: 0.48;
  --bl: 15px; --dur: 19s; --rot: -18deg; --rot2: 5deg; --skew: -8deg; --tx: 20px; --ty: -22px;
}

/* ===== CENTER: subtle mixing ribbons ===== */
.r-mix-1 {
  width: 60px; height: 400px;
  background: linear-gradient(170deg, rgba(241,56,132,0.4) 0%, rgba(52,224,255,0.3) 50%, transparent);
  top: 20%; left: 42%;
  opacity: 0.4;
  --bl: 25px; --dur: 20s; --rot: -5deg; --rot2: 10deg; --skew: 6deg; --tx: 15px; --ty: 10px;
}
.r-mix-2 {
  width: 50px; height: 380px;
  background: linear-gradient(195deg, rgba(149,62,195,0.4) 0%, rgba(247,81,59,0.3) 50%, transparent);
  top: 25%; left: 50%;
  opacity: 0.35;
  --bl: 25px; --dur: 22s; --rot: 8deg; --rot2: -6deg; --skew: -8deg; --tx: -12px; --ty: 15px;
}

/* Vignette */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 75% 70% at 50% 50%, transparent 35%, rgba(2,2,6,0.55) 100%);
  z-index: 3;
}

/* Glass sample */
.glass-sample {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 420px; padding: 24px 28px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 0 24px rgba(255,255,255,0.05),
    0 8px 40px rgba(0,0,0,0.4);
  color: rgba(255,255,255,0.9);
  font-family: sans-serif;
  font-size: 14px;
  line-height: 1.9;
  z-index: 50;
}
.glass-sample strong { color: #fff; }
.glass-sample .hl { color: #34e0ff; font-weight: 700; }
</style>
</head>
<body>

<div class="ribbon-canvas">
  <!-- Top-left: Pink-Red -->
  <div class="ribbon r-pink-1"></div>
  <div class="ribbon r-pink-2"></div>
  <div class="ribbon r-pink-3"></div>

  <!-- Top-right: Cyan-Blue -->
  <div class="ribbon r-cyan-1"></div>
  <div class="ribbon r-cyan-2"></div>
  <div class="ribbon r-cyan-3"></div>

  <!-- Bottom-left: Purple -->
  <div class="ribbon r-purple-1"></div>
  <div class="ribbon r-purple-2"></div>

  <!-- Bottom-right: Orange-Yellow -->
  <div class="ribbon r-orange-1"></div>
  <div class="ribbon r-orange-2"></div>

  <!-- Center: subtle mixing -->
  <div class="ribbon r-mix-1"></div>
  <div class="ribbon r-mix-2"></div>
</div>

<div class="vignette"></div>

<div class="glass-sample">
  おかえり、<strong>佐藤さん</strong>。<br>
  前回は<span class="hl">ネットワーク基礎</span>まで進みましたね。
</div>

</body>
</html>
