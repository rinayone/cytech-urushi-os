<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>背景: CyTech Volcano × 漆</title>
<style>
* { margin: 0; padding: 0; }
body { background: #020206; overflow: hidden; height: 100vh; }

/* Layer 1 (deepest) */
.volcano-layer-1 {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 50% at 20% 25%, rgba(149,62,195,0.1) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 80% 75%, rgba(15,75,171,0.1) 0%, transparent 55%);
  animation: l1 28s ease-in-out infinite alternate;
}
@keyframes l1 {
  0% { transform: scale(1); }
  100% { transform: scale(1.04); }
}

/* Layer 2: flowing ribbons spread across screen */
.volcano-layer-2 {
  position: fixed;
  inset: 0;
}
.volcano-layer-2 .flow {
  position: absolute;
  filter: blur(50px);
  animation: flowMorph var(--morph) ease-in-out infinite alternate,
             flowDrift var(--drift) ease-in-out infinite alternate;
}
@keyframes flowMorph {
  0%   { border-radius: 30% 70% 60% 40% / 60% 30% 70% 40%; }
  33%  { border-radius: 60% 40% 35% 65% / 40% 65% 30% 70%; }
  66%  { border-radius: 40% 60% 70% 30% / 70% 40% 60% 30%; }
  100% { border-radius: 65% 35% 40% 60% / 35% 70% 40% 60%; }
}
@keyframes flowDrift {
  0%   { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); }
}

/* Top-left: Pink-Red */
.flow-pink {
  width: 280px; height: 500px;
  background: linear-gradient(160deg, #f13884 0%, rgba(247,81,59,0.5) 60%, transparent 100%);
  top: -8%; left: -3%;
  opacity: 0.6;
  --morph: 14s; --drift: 20s;
  --tx: 40px; --ty: 30px; --rot: 8deg;
}

/* Top-right: Cyan-Blue */
.flow-cyan {
  width: 260px; height: 520px;
  background: linear-gradient(200deg, #34e0ff 0%, rgba(15,75,171,0.6) 60%, transparent 100%);
  top: -5%; right: -2%;
  opacity: 0.58;
  --morph: 13s; --drift: 22s;
  --tx: -35px; --ty: 25px; --rot: -6deg;
}

/* Bottom-left: Purple */
.flow-purple {
  width: 300px; height: 480px;
  background: linear-gradient(20deg, #953ec3 0%, rgba(241,56,132,0.4) 60%, transparent 100%);
  bottom: -10%; left: 5%;
  opacity: 0.55;
  --morph: 16s; --drift: 24s;
  --tx: 30px; --ty: -35px; --rot: 5deg;
}

/* Bottom-right: Orange-Yellow */
.flow-orange {
  width: 250px; height: 460px;
  background: linear-gradient(340deg, #f7513b 0%, rgba(248,238,26,0.45) 60%, transparent 100%);
  bottom: -6%; right: 8%;
  opacity: 0.55;
  --morph: 15s; --drift: 18s;
  --tx: -40px; --ty: -30px; --rot: -7deg;
}

/* Layer 3: surface streams, also spread */
.volcano-layer-3 {
  position: fixed;
  inset: 0;
}
.volcano-layer-3 .stream {
  position: absolute;
  filter: blur(35px);
  animation: streamFlow var(--sf) ease-in-out infinite alternate;
}
@keyframes streamFlow {
  0%   { border-radius: 25% 75% 65% 35% / 70% 30% 65% 35%; transform: translate(0, 0) rotate(0deg); }
  50%  { border-radius: 70% 30% 35% 65% / 35% 65% 30% 70%; transform: translate(var(--sx), var(--sy)) rotate(var(--sr)); }
  100% { border-radius: 35% 65% 70% 30% / 65% 35% 70% 30%; transform: translate(calc(var(--sx) * -0.5), calc(var(--sy) * -0.5)) rotate(calc(var(--sr) * -1)); }
}

/* Upper-left accent */
.stream-1 {
  width: 150px; height: 380px;
  background: linear-gradient(155deg, rgba(241,56,132,0.7), rgba(149,62,195,0.4) 60%, transparent);
  top: 5%; left: 12%;
  opacity: 0.6;
  --sf: 12s; --sx: 20px; --sy: 15px; --sr: 4deg;
}

/* Upper-right accent */
.stream-2 {
  width: 130px; height: 350px;
  background: linear-gradient(210deg, rgba(52,224,255,0.65), rgba(15,75,171,0.4) 60%, transparent);
  top: 8%; right: 15%;
  opacity: 0.58;
  --sf: 14s; --sx: -18px; --sy: 20px; --sr: -3deg;
}

/* Lower-left accent */
.stream-3 {
  width: 140px; height: 360px;
  background: linear-gradient(30deg, rgba(149,62,195,0.6), rgba(52,224,255,0.3) 60%, transparent);
  bottom: 8%; left: 18%;
  opacity: 0.55;
  --sf: 11s; --sx: 15px; --sy: -18px; --sr: 5deg;
}

/* Lower-right accent */
.stream-4 {
  width: 120px; height: 340px;
  background: linear-gradient(330deg, rgba(247,81,59,0.6), rgba(248,238,26,0.3) 60%, transparent);
  bottom: 12%; right: 12%;
  opacity: 0.58;
  --sf: 13s; --sx: -20px; --sy: -15px; --sr: -4deg;
}

/* Vignette */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 75% 70% at 50% 50%, transparent 35%, rgba(2,2,6,0.6) 100%);
  z-index: 3;
}

/* Glass sample */
.glass-sample {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 420px; padding: 24px 28px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 0 24px rgba(255,255,255,0.05),
    0 8px 40px rgba(0,0,0,0.4);
  color: rgba(255,255,255,0.9);
  font-family: sans-serif;
  font-size: 14px;
  line-height: 1.9;
  z-index: 50;
}
.glass-sample strong { color: #fff; }
.glass-sample .hl { color: #34e0ff; font-weight: 700; }
</style>
</head>
<body>

<div class="volcano-layer-1"></div>

<div class="volcano-layer-2">
  <div class="flow flow-pink"></div>
  <div class="flow flow-cyan"></div>
  <div class="flow flow-purple"></div>
  <div class="flow flow-orange"></div>
</div>

<div class="volcano-layer-3">
  <div class="stream stream-1"></div>
  <div class="stream stream-2"></div>
  <div class="stream stream-3"></div>
  <div class="stream stream-4"></div>
</div>

<div class="vignette"></div>

<div class="glass-sample">
  おかえり、<strong>佐藤さん</strong>。<br>
  前回は<span class="hl">ネットワーク基礎</span>まで進みましたね。
</div>

</body>
</html>
