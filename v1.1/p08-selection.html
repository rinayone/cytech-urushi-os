<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyTech Urushi OS — 選考管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { font-family: 'Noto Sans JP', 'Lato', sans-serif; background: #050508; color: #fff; overflow-x: hidden; overflow-y: auto; opacity: 0; animation: pageIn 0.8s ease 0.1s forwards; }
@keyframes pageIn { to { opacity: 1; } }
.bg-volcano { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-volcano img { position: absolute; top: 0; right: -10%; height: 100%; width: auto; object-fit: cover; opacity: 0.6; }
.bg-volcano::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, rgba(5,5,8,0.85) 30%, rgba(5,5,8,0.5) 55%, rgba(5,5,8,0.2) 100%); }
.header { position: fixed; top: 16px; left: 16px; right: 16px; height: 52px; z-index: 50; display: flex; align-items: center; padding: 0 18px; gap: 10px; background: rgba(0,0,0,0.01); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border-radius: 20px; box-shadow: inset 1px 1px 20px rgba(255,255,255,0.2); }
.header img { height: 22px; }
.header .ht { font-family: 'Lato', sans-serif; font-size: 12px; color: rgba(255,255,255,0.35); }
.header .hr { margin-left: auto; display: flex; gap: 8px; }
.hb { padding: 8px 18px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; border: none; color: #fff; }
.hb-blue { background: linear-gradient(135deg, #0f4bab, #34e0ff); }
.main { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; padding: 84px 20px 40px; }
.glass { background: rgba(0,0,0,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; box-shadow: inset 0px 0px 30px rgba(255,255,255,0.3), inset -1px -2px 2px rgba(255,255,255,0.1), inset 1px 1px 2px rgba(255,255,255,0.3); padding: 24px; margin-bottom: 16px; }
.sec-title { font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 12px; margin-top: 28px; }
.hl { color: #34e0ff; font-weight: 700; }
.page-title { font-family: 'Lato', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.page-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }

/* Gate status */
.gate-banner { padding: 20px; border-radius: 16px; background: rgba(247,81,59,0.08); border: 1px solid rgba(247,81,59,0.2); margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
.gate-banner .gate-icon { font-size: 28px; }
.gate-banner .gate-text { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.8); flex: 1; }
.gate-banner .gate-text strong { color: #fff; }

/* Steps */
.step-row { display: flex; align-items: center; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
.step-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: rgba(255,255,255,0.35); }
.step-item.done { color: #34e0ff; }
.step-item.current { color: #fff; font-weight: 700; }
.step-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
.step-item.done .step-dot { background: #34e0ff; border-color: #34e0ff; color: #000; }
.step-item.current .step-dot { border-color: #f13884; background: rgba(241,56,132,0.15); color: #f13884; }
.step-line { width: 20px; height: 2px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
.step-item.done + .step-line { background: #34e0ff; }

/* Company card */
.company-card { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.company-card:last-child { border-bottom: none; }
.co-logo { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: rgba(255,255,255,0.4); flex-shrink: 0; }
.co-info { flex: 1; }
.co-name { font-size: 14px; font-weight: 700; }
.co-pos { font-size: 12px; color: rgba(255,255,255,0.4); }
.co-status { padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.status-locked { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.06); }
.status-progress { background: rgba(52,224,255,0.12); color: #34e0ff; }

.entry-btn { width: 100%; padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: rgba(255,255,255,0.25); font-size: 14px; font-weight: 700; cursor: not-allowed; font-family: 'Noto Sans JP', sans-serif; margin-top: 16px; text-align: center; }

.ai-fab { position: fixed; bottom: 24px; right: 24px; z-index: 80; width: 80px; height: 80px; background: #fff; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: all 0.2s; user-select: none; touch-action: none; }
.ai-fab:hover { transform: scale(1.05); }
.ai-fab.dragging { background: rgba(255,255,255,0.63); box-shadow: inset 0px 0px 30px rgba(255,255,255,0.3), inset -1px -2px 2px rgba(255,255,255,0.1), inset 1px 1px 2px rgba(255,255,255,0.3), 0 4px 20px rgba(0,0,0,0.3); }
.ai-fab .fab-orb { width: 32px; height: 32px; border-radius: 50%; background: conic-gradient(from 0deg,#f13884,#f7513b,#f8ee1a,#7cbf00,#34e0ff,#0f4bab,#953ec3,#f13884); filter: blur(2px) saturate(1.2); position: relative; }
.ai-fab .fab-face { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 16px; height: 8px; background: rgba(8,8,35,0.7); border-radius: 100px; display: flex; align-items: center; justify-content: center; gap: 5px; z-index: 2; }
.ai-fab .fab-eye { width: 2px; height: 5px; background: #fff; border-radius: 1px; }
.ai-fab .fab-text { font-family: 'Noto Sans JP', sans-serif; font-size: 9px; font-weight: 500; background: linear-gradient(to right, #0f4bab, #34e0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
</style>
</head>
<body>
<div class="bg-volcano"><img src="volcano-bg.png" alt=""></div>
<header class="header"><img src="logo.png" alt="CyTech"><span class="ht">選考管理</span><div class="hr"><button class="hb hb-blue" onclick="location.href='p03-dashboard.html'">ダッシュボードへ →</button></div></header>

<main class="main">
  <h1 class="page-title">選考管理</h1>
  <p class="page-sub">Skill Primeゲートを達成すると、エントリーが可能になります。</p>

  <!-- Gate status -->
  <div class="gate-banner">
    <div class="gate-icon">&#128274;</div>
    <div class="gate-text"><strong>Skill Prime 未達成</strong> — カリキュラム完了率52%。あと<span class="hl">38時間</span>の学習で面接資格を取得できます。</div>
  </div>

  <!-- Steps -->
  <div class="sec-title">選考ステップ</div>
  <div class="step-row">
    <div class="step-item current"><span class="step-dot">1</span>学習中</div><div class="step-line"></div>
    <div class="step-item"><span class="step-dot">2</span>達成</div><div class="step-line"></div>
    <div class="step-item"><span class="step-dot">3</span>エントリー</div><div class="step-line"></div>
    <div class="step-item"><span class="step-dot">4</span>書類</div><div class="step-line"></div>
    <div class="step-item"><span class="step-dot">5</span>面接</div><div class="step-line"></div>
    <div class="step-item"><span class="step-dot">6</span>内定</div>
  </div>

  <!-- Companies -->
  <div class="sec-title">エントリー可能企業</div>
  <div class="glass">
    <div class="company-card">
      <div class="co-logo">A</div>
      <div class="co-info"><div class="co-name">◯◯株式会社</div><div class="co-pos">情シス — 社内IT管理</div></div>
      <span class="co-status status-locked">ゲート未達</span>
    </div>
    <div class="company-card">
      <div class="co-logo">B</div>
      <div class="co-info"><div class="co-name">△△株式会社</div><div class="co-pos">情シス — DX推進</div></div>
      <span class="co-status status-locked">ゲート未達</span>
    </div>
    <div class="company-card">
      <div class="co-logo">C</div>
      <div class="co-info"><div class="co-name">□□テクノロジーズ</div><div class="co-pos">社内SE — インフラ運用</div></div>
      <span class="co-status status-locked">ゲート未達</span>
    </div>
    <div class="entry-btn">カリキュラム完了でエントリーボタンが有効になります</div>
  </div>
</main>

<div class="ai-fab" id="aiFab" onclick="if(!this._dragged)location.href='p02-ai-dialogue.html'"><div class="fab-orb"><div class="fab-face"><div class="fab-eye"></div><div class="fab-eye"></div></div></div><div class="fab-text">AIと対話する</div></div>
<script>(function(){var fab=document.getElementById('aiFab'),sx,sy,ox,oy,d;fab.addEventListener('pointerdown',function(e){sx=e.clientX;sy=e.clientY;ox=fab.offsetLeft;oy=fab.offsetTop;d=false;fab._dragged=false;function m(e2){var dx=e2.clientX-sx,dy=e2.clientY-sy;if(Math.abs(dx)>4||Math.abs(dy)>4){d=true;fab._dragged=true;fab.classList.add('dragging');fab.style.position='fixed';fab.style.left=(ox+dx)+'px';fab.style.top=(oy+dy)+'px';fab.style.right='auto';fab.style.bottom='auto';}}function u(){document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);fab.classList.remove('dragging');if(!d)fab._dragged=false;}document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);});})();</script>
</body>
</html>
