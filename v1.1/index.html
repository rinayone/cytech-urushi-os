<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyTech Urushi OS - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Lato', 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000000;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url('bg.jpg') center / cover no-repeat;
  opacity: 0.85;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
  z-index: 1;
  pointer-events: none;
}

.login-card {
  position: relative;
  z-index: 2;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 48px 40px;
  width: 420px;
  max-width: 90vw;
  box-shadow:
    inset 0px 0px 30px rgba(255, 255, 255, 0.3),
    inset -1px -2px 2px rgba(255, 255, 255, 0.1),
    inset 1px 1px 2px rgba(255, 255, 255, 0.3);
  text-align: center;
}

.logo-img {
  width: 64px;
  height: 64px;
  margin-bottom: 20px;
  object-fit: contain;
}

.login-card h1 {
  font-family: 'Lato', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}

.login-card .subtitle {
  font-family: 'Lato', sans-serif;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 36px;
}

.login-card .field {
  text-align: left;
  margin-bottom: 24px;
}

.login-card label {
  display: block;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 8px;
}

.login-card input[type="password"] {
  width: 100%;
  padding: 12px 20px;
  background: rgba(0, 0, 0, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 100px;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  color: #ffffff;
  outline: none;
  transition: border-color 0.2s;
}

.login-card input[type="password"]::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.login-card input[type="password"]:focus {
  border-color: rgba(255, 255, 255, 0.5);
}

.login-card button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #953ec3 0%, #0f4bab 100%);
  color: #ffffff;
  border: none;
  border-radius: 100px;
  font-size: 15px;
  font-family: 'Lato', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
  letter-spacing: 0.3px;
}

.login-card button:hover {
  opacity: 0.9;
}

.login-card button:active {
  opacity: 0.8;
}

.error-msg {
  color: #f7513b;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  font-size: 13px;
  margin-top: 14px;
  min-height: 20px;
}
</style>
</head>
<body>
<div class="login-card">
  <img src="logo.png" alt="CyTech Urushi OS" class="logo-img">
  <h1>CyTech Urushi OS</h1>
  <p class="subtitle">Platform Access</p>
  <div class="field">
    <label for="pw">パスワード</label>
    <input type="password" id="pw" placeholder="パスワードを入力" autocomplete="off">
  </div>
  <button id="loginBtn">ログイン</button>
  <p class="error-msg" id="err"></p>
</div>
<script>
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}
async function tryLogin() {
  const pw = document.getElementById('pw').value;
  if (!pw) { document.getElementById('err').textContent = 'パスワードを入力してください'; return; }
  const hash = await sha256(pw);
  const target = hash + '.html';
  try {
    const res = await fetch(target, { method: 'HEAD' });
    if (res.ok) {
      window.location.href = target;
    } else {
      document.getElementById('err').textContent = 'パスワードが正しくありません';
    }
  } catch (e) {
    document.getElementById('err').textContent = 'パスワードが正しくありません';
  }
}
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
</script>
</body>
</html>
