<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyTech Urushi OS - Version Select</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Lato', 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  overflow: hidden;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url('v1/bg.jpg') center / cover no-repeat;
  opacity: 0.85;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
  z-index: 1;
  pointer-events: none;
}
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 720px;
  width: 90vw;
}
.logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 20px; }
h1 {
  font-family: 'Lato', sans-serif;
  font-weight: 900;
  font-size: 32px;
  color: #fff;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 48px;
}
.version-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.version-card {
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: inset 0px 0px 30px rgba(255,255,255,0.3), inset -1px -2px 2px rgba(255,255,255,0.1), inset 1px 1px 2px rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 32px 24px;
  text-decoration: none;
  color: #fff;
  transition: all 0.25s;
  border: 2px solid transparent;
  display: block;
}
.version-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.15);
}
.version-tag {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 16px;
}
.tag-stable { background: rgba(166,227,161,0.2); color: #a6e3a1; }
.tag-dev { background: rgba(52,224,255,0.2); color: #34e0ff; }
.version-card h2 {
  font-family: 'Lato', sans-serif;
  font-weight: 700;
  font-size: 20px;
  margin-bottom: 8px;
}
.version-card p {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
}
@media (max-width: 600px) {
  .version-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <img src="v1/logo.png" alt="CyTech Urushi OS" class="logo">
  <h1>CyTech Urushi OS</h1>
  <p class="subtitle">バージョンを選択してください</p>
  <div class="version-grid">
    <a href="v1/" class="version-card">
      <span class="version-tag tag-stable">STABLE</span>
      <h2>Version 1.0</h2>
      <p>全ポータル対応版<br>求職者 / 企業管理者 / TNG管理者</p>
    </a>
    <a href="v1.1/" class="version-card">
      <span class="version-tag tag-dev">DEV</span>
      <h2>Version 1.1</h2>
      <p>求職者フォーカス版<br>UI/構成ブラッシュアップ</p>
    </a>
  </div>
</div>
</body>
</html>
