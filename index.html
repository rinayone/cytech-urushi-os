<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyTech Urushi OS - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', 'Lato', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #e8f5e9 0%, #f5f5f0 40%, #e0f2f1 100%);
}
.login-card {
  background: #fff;
  border-radius: 12px;
  padding: 48px 40px;
  width: 400px;
  max-width: 90vw;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  text-align: center;
}
.login-card h1 {
  font-size: 24px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}
.login-card .subtitle {
  font-size: 13px;
  color: #888;
  margin-bottom: 32px;
}
.login-card .field {
  text-align: left;
  margin-bottom: 20px;
}
.login-card label {
  display: block;
  font-size: 13px;
  color: #555;
  margin-bottom: 6px;
}
.login-card input[type="password"] {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #d0d0d0;
  border-radius: 6px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.login-card input[type="password"]:focus {
  border-color: #0d9668;
}
.login-card button {
  width: 100%;
  padding: 12px;
  background: #1a1a2e;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.login-card button:hover {
  background: #2a2a3e;
}
.error-msg {
  color: #d32f2f;
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
}
.logo-mark {
  width: 48px;
  height: 48px;
  background: #0d9668;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo-mark">CU</div>
  <h1>CyTech Urushi OS</h1>
  <p class="subtitle">Platform Access</p>
  <div class="field">
    <label for="pw">パスワード</label>
    <input type="password" id="pw" placeholder="パスワードを入力" autocomplete="off">
  </div>
  <button id="loginBtn">ログイン</button>
  <p class="error-msg" id="err"></p>
</div>
<script>
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}
async function tryLogin() {
  const pw = document.getElementById('pw').value;
  if (!pw) { document.getElementById('err').textContent = 'パスワードを入力してください'; return; }
  const hash = await sha256(pw);
  const target = hash + '.html';
  try {
    const res = await fetch(target, { method: 'HEAD' });
    if (res.ok) {
      window.location.href = target;
    } else {
      document.getElementById('err').textContent = 'パスワードが正しくありません';
    }
  } catch (e) {
    document.getElementById('err').textContent = 'パスワードが正しくありません';
  }
}
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
</script>
</body>
</html>
