<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>背景B: 流体グラデーション</title>
<style>
* { margin: 0; padding: 0; }
body { background: #050508; overflow: hidden; height: 100vh; }
.label {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  font-family: sans-serif; font-size: 14px; color: rgba(255,255,255,0.5);
  z-index: 100; text-align: center; letter-spacing: 1px;
}
.mesh {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 25% 20%, rgba(241,56,132,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 50% 60% at 75% 15%, rgba(247,81,59,0.14) 0%, transparent 50%),
    radial-gradient(ellipse 55% 55% at 80% 65%, rgba(52,224,255,0.14) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 15% 70%, rgba(149,62,195,0.14) 0%, transparent 50%),
    radial-gradient(ellipse 40% 40% at 50% 45%, rgba(15,75,171,0.10) 0%, transparent 45%);
  animation: meshShift 20s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0% { filter: blur(0px); transform: scale(1) rotate(0deg); }
  50% { filter: blur(2px); transform: scale(1.05) rotate(1deg); }
  100% { filter: blur(0px); transform: scale(1) rotate(-1deg); }
}
/* Glass sample */
.glass-sample {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 400px; padding: 24px 28px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  box-shadow: inset 0 0 20px rgba(255,255,255,0.12), 0 8px 32px rgba(0,0,0,0.3);
  color: #fff; font-family: sans-serif; font-size: 14px; line-height: 1.8;
  z-index: 50;
}
</style>
</head>
<body>
<div class="label">B: 流体グラデーション（Mesh Gradient風）</div>
<div class="mesh"></div>
<div class="glass-sample">
  おかえり、佐藤さん。<br>前回はネットワーク基礎まで進みましたね。
</div>
</body>
</html>
